<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de aniversarios</title>
</head>

<body>

    <header container-header>
        <h1 class="page-title">Registro de data de aniversarios</h1>
    </header>
    <main class="container-main">
        <section>
            <form class="form js-form">
                <label for="nome">
                    <input type="text" id="nome" class="form input-name field js-field" min="3" max="120"
                        pattern="[A-Za-zÀ-ÿ\s]+" required placeholder="Digite seu nome">
                </label>
                <label for="birthDate" required>
                    <input type="date" id="birthDate" class="form input-birthdate field js-field" required>
                </label>
                <button type="submit" class="register-people">Salvar</button>
                <button type="button" class="js-clear-button">Limpar</button>
            </form>
        </section>
        <section class="js-result"></section>
    </main>
    <script type="module" src="src/main.js"></script>
</body>

</html>
